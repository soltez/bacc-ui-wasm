<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Baccarat Scoreboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #2a2a2a;
        color: #eee;
        padding: 16px;
        margin: 0;
      }
      .row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .panel { display: flex; flex-direction: column; }
      .panel svg { display: block; width: 100%; height: auto; }
      .app { max-width: 1200px; margin: 0 auto; }
      .table { width: 90%; border: 1px solid red; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="table">
      </div>
      <div class="controls">
        <button id="deal">Deal</button>
      </div>
      <div class="scoreboard">
        <div class="row">
          <div class="panel" style="flex: 1">
            <div id="bead-plate"></div>
          </div>
          <div class="panel" style="flex: 2; margin-left: 8px;">
            <div id="big-road"></div>
          </div>
        </div>
        <div class="row">
          <div class="panel" style="flex: 1">
            <div id="big-eye-boy"></div>
          </div>
          <div class="panel" style="flex: 1; margin-left: 8px;">
            <div id="small-road"></div>
          </div>
          <div class="panel" style="flex: 1; margin-left: 8px;">
            <div id="cockroach-pig"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./bootstrap.js"></script>
  </body>
</html>
