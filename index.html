<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Baccarat Scoreboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #2a2a2a;
        color: #eee;
        padding: 16px;
        margin: 0;
      }
      .row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 8px;
      }
      .panel { display: flex; flex-direction: column; }
      .panel svg { display: block; width: 100%; height: auto; }
      .app { max-width: 1200px; margin: 0 auto; }
      .projects {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #3a3a3a;
      }
      .project-tile {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 14px;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        text-decoration: none;
        min-width: 140px;
      }
      .project-tile:hover { border-color: #666; }
      .project-name {
        font-family: monospace;
        font-size: 13px;
        color: #eee;
      }
      .project-desc {
        font-size: 12px;
        color: #aaa;
      }
      .table {
        display: flex;
        align-items: flex-start;
        gap: 24px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .table > button { align-self: center; margin: auto 0; }
      .hand {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 146px;
      }
      .hand-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .hand-label {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #aaa;
      }
      .hand-value {
        font-size: 20px;
        font-weight: bold;
        color: #eee;
      }
      .hand-cards {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
      }
      .hand-cards { flex-direction: column; gap: 6px; min-height: 178px; }
      .hand-row { display: flex; flex-direction: row; gap: 6px; }
      .hand-row.centered { justify-content: center; }
      .card-wrap { flex-shrink: 0; position: relative; width: 70px; height: 101.7px; overflow: hidden; }
      .card-wrap svg { display: block; width: 70px; height: auto; }
      .peel-layer { position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; }
      .peel-bottom { opacity: 0; }
      .peel-svg-clip-element { position: absolute; top: -10000px; left: -10000px; width: 1px; height: 1px; opacity: 0; }
      .pred-row { align-items: center; gap: 8px; margin-bottom: 8px; }
      #prediction svg { display: block; }
      .card-wrap.rotated {
        position: relative;
        flex-shrink: 0;
        width: 101.7px;
        height: 70px;
      }
      .card-wrap.rotated svg {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 70px;
        height: auto;
        transform: translate(-50%, -50%) rotate(90deg);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="table">
        <div class="hand">
          <div class="hand-header">
            <span class="hand-label">Player</span>
            <span class="hand-value" id="player-value">0</span>
          </div>
          <div class="hand-cards" id="player-cards"></div>
        </div>
        <div class="hand">
          <div class="hand-header">
            <span class="hand-label">Banker</span>
            <span class="hand-value" id="banker-value">0</span>
          </div>
          <div class="hand-cards" id="banker-cards"></div>
        </div>
        <button id="deal">Deal</button>
      </div>
      <div class="scoreboard">
        <div class="row pred-row">
          <span class="hand-label">Next</span>
          <div id="prediction"></div>
        </div>
        <div class="row">
          <div class="panel" style="flex: 1">
            <div id="bead-plate"></div>
          </div>
          <div class="panel" style="flex: 2; margin-left: 8px;">
            <div id="big-road"></div>
          </div>
        </div>
        <div class="row">
          <div class="panel" style="flex: 1">
            <div id="big-eye-boy"></div>
          </div>
          <div class="panel" style="flex: 1; margin-left: 8px;">
            <div id="small-road"></div>
          </div>
          <div class="panel" style="flex: 1; margin-left: 8px;">
            <div id="cockroach-pig"></div>
          </div>
        </div>
      </div>
      <div class="projects">
        <span class="hand-label" style="width: 100%;">Related Projects</span>
        <a class="project-tile" href="https://github.com/soltez/kev-rs" target="_blank" rel="noopener">
          <span class="project-name">kev-rs</span>
          <span class="project-desc">Cactus Kev playing card encoding in Rust</span>
        </a>
        <a class="project-tile" href="https://github.com/soltez/shoe-rs" target="_blank" rel="noopener">
          <span class="project-name">shoe-rs</span>
          <span class="project-desc">Baccarat shoe and dealing logic in Rust</span>
        </a>
        <a class="project-tile" href="https://github.com/soltez/bacc-rs" target="_blank" rel="noopener">
          <span class="project-name">bacc-rs</span>
          <span class="project-desc">Baccarat game server in Rust</span>
        </a>
        <a class="project-tile" href="https://github.com/soltez/bacc-ts" target="_blank" rel="noopener">
          <span class="project-name">bacc-ts</span>
          <span class="project-desc">Baccarat scoreboard engine in TypeScript</span>
        </a>
        <a class="project-tile" href="https://github.com/soltez/bacc-ui-wasm" target="_blank" rel="noopener">
          <span class="project-name">bacc-ui-wasm</span>
          <span class="project-desc">Baccarat UI with Rust WASM card renderer</span>
        </a>
      </div>
    </div>
    <script src="./bootstrap.js"></script>
  </body>
</html>
